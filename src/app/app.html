<!-- src/app/app.component.html -->

@if (authService.isLoading()) {
  <!-- Estado de carga inicial -->
  <div class="loading-screen">
    <div class="spinner"></div>
    <p>Cargando Mi Tiendita...</p>
  </div>
} @else {
  <!-- Mostrar layout solo si está autenticado -->
  @if (authService.currentUser()) {
    <app-layout>
      <router-outlet />
    </app-layout>
  } @else {
    <!-- Si no está autenticado, solo muestra la ruta (login) -->
    <router-outlet />
  }
}
